name: deploy-web

# Builds the Flutter web app and deploys it to Cloudflare Pages (the spec host,
# R-M6). Skips gracefully (green no-op) until the two Cloudflare secrets exist,
# so it never blocks the gate. Static-only preview — no DB/backend (Stage-3-safe).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  cloudflare-pages:
    name: Build web + deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_PROJECT: ratel
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare config (graceful skip if unset)
        id: cfg
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::notice::Cloudflare secrets not set — skipping deploy. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        if: steps.cfg.outputs.ready == 'true'
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Resolve deps
        if: steps.cfg.outputs.ready == 'true'
        run: flutter pub get

      - name: Codegen (freezed/json parts are gitignored)
        if: steps.cfg.outputs.ready == 'true'
        run: dart run build_runner build

      - name: Build web (root base-href for *.pages.dev; no service worker)
        if: steps.cfg.outputs.ready == 'true'
        # To turn the auth flow ON in production, append: --dart-define=RATEL_AUTH=true
        # (HELD OFF: the web auth-init crashes at runtime — see main.dart guard /
        # the auth-init bug; re-enable only once that is fixed and verified in a browser).
        run: flutter build web --release --base-href "/" --pwa-strategy=none --dart-define=RATEL_AUTH=true --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Stamp deploy marker (ground-truth verification endpoint, §25)
        if: steps.cfg.outputs.ready == 'true'
        run: |
          echo "ratel ${{ github.sha }} | flutter 3.44.1 | web | deployed $(date -u +%FT%TZ)" > build/web/build-info.txt
          cat build/web/build-info.txt

      - name: Deploy to Cloudflare Pages
        if: steps.cfg.outputs.ready == 'true'
        run: |
          npx --yes wrangler@3 pages project create "$PAGES_PROJECT" --production-branch=main 2>/dev/null || true
          npx --yes wrangler@3 pages deploy build/web --project-name="$PAGES_PROJECT" --branch=main
