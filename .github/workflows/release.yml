name: release

# Builds every platform in RELEASE and publishes downloadable assets as ROLLING
# GitHub Releases (permanent URLs at /releases/tag/latest-<platform>). MANUAL ONLY
# (workflow_dispatch) — desktop/Apple runners cost money and releases are deliberate.
#
# Android is signed with your keystore when these repo secrets are set (else debug-signed,
# which still installs for testing but is NOT valid for Play):
#   ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
# Setup guide: Apps/RATEL/go-live/ANDROID_RELEASE_SETUP.md
#
# Apple targets are BEST-EFFORT (continue-on-error): macos-latest Xcode can be
# incompatible with the pinned Flutter 3.44.1 Apple toolchain. iOS produces NO
# installable file without a paid Apple Developer account (compile-check only).

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen (freezed/json_serializable are gitignored)
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Decode keystore (skips if secret absent)
        id: ks
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded — release will be signed."
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — Android will be DEBUG-signed (sideload-testable, NOT valid for Play)."
          fi
      - name: Build APK + AAB (release)
        env:
          RELEASE_STORE_FILE: ${{ steps.ks.outputs.path }}
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
          flutter build appbundle --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
      - name: Publish Android release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-android
          name: Ratel — Android (latest)
          body: "Rolling Android release. app-release.apk = install directly (sideload); app-release.aab = Google Play upload."
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          fail_on_unmatched_files: true

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build web --release --pwa-strategy=none --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
      - name: Package web
        run: cd build/web && zip -r "$GITHUB_WORKSPACE/ratel-web.zip" .
      - name: Publish Web release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-web
          name: Ratel — Web (latest)
          body: "Static web build. Unzip and serve any static host, or just use learnwithratel.com."
          files: ratel-web.zip
          fail_on_unmatched_files: true

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Linux desktop build deps (GTK/ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
      - name: Package linux
        run: tar -C build/linux/x64/release/bundle -czf ratel-linux-x64.tar.gz .
      - name: Publish Linux release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-linux
          name: Ratel — Linux x64 (latest)
          body: "Extract the tarball and run ./ratel (GTK3 required)."
          files: ratel-linux-x64.tar.gz
          fail_on_unmatched_files: true

  windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
      - name: Package windows
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ratel-windows-x64.zip -Force
      - name: Publish Windows release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-windows
          name: Ratel — Windows x64 (latest)
          body: "Extract the zip and run ratel.exe (unsigned — Windows SmartScreen may prompt)."
          files: ratel-windows-x64.zip
          fail_on_unmatched_files: true

  macos:
    name: macOS (best-effort, unsigned)
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
      - name: Package macOS app
        run: |
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP" ratel-macos.zip
      - name: Publish macOS release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-macos
          name: Ratel — macOS (latest, unsigned)
          body: "Unsigned .app — right-click > Open to bypass Gatekeeper. Best-effort (runner Xcode vs Flutter 3.44.1)."
          files: ratel-macos.zip
          fail_on_unmatched_files: true

  ios:
    name: iOS (compile-check only)
    runs-on: macos-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS (no codesign — validation only)
        run: flutter build ios --release --no-codesign --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} --dart-define=RATEL_AUTH=true --dart-define=RATEL_ANON=true
      - run: echo "iOS compiled. No installable file (IPA) is produced without a paid Apple Developer account + code signing."
