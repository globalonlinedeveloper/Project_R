name: release-android

# Builds a SIGNED Android App Bundle (.aab) for Google Play upload.
# MANUAL ONLY (workflow_dispatch) — releases are deliberate and need signing secrets.
# Graceful-degrade: if the signing secrets are absent it builds a DEBUG-signed AAB so
# the job still stays green; a real Play upload requires the secrets listed below.
#
# Required GitHub Actions secrets (repo Settings > Secrets and variables > Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of release.keystore
#   ANDROID_KEYSTORE_PASSWORD  keystore (store) password
#   ANDROID_KEY_ALIAS          key alias inside the keystore
#   ANDROID_KEY_PASSWORD       key (alias) password (often equal to the store password)

on:
  workflow_dispatch:

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-aab:
    name: Signed App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get
      - name: Generate code (freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode keystore (skips if secret absent)
        id: keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded."
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — building a DEBUG-signed AAB (NOT uploadable to Play). Add the signing secrets to produce a release build."
          fi

      - name: Build App Bundle (release)
        env:
          RELEASE_STORE_FILE: ${{ steps.keystore.outputs.path }}
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratel-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
