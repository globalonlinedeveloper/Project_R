name: build-matrix

# Cross-platform BUILD VERIFICATION — compiles every Flutter target (Android APK,
# Web, Linux, iOS, macOS, Windows) so a change that breaks a platform is caught
# per release. Like deploy-web.yml / perf-bench.yml this is a SEPARATE, NON-required
# workflow: it never blocks the red-blocking `flutter-gate` in ci.yml. Project_R is
# a PUBLIC repo, so Linux/macOS/Windows runners are all free. Build-only (+ artifact)
# — the Android on-device run is covered by perf-bench.yml. Runs on push to main +
# manual dispatch (not PRs, to keep PR feedback fast). Local · NO DB · schema frozen · 161.
#
# Job names show the TARGET (e.g. "Android (APK)", "iOS"); the host runner each build
# needs is `matrix.os` (ubuntu = apk/web/linux, macOS = ios/macos, windows = windows).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "Android (APK)", os: ubuntu-latest,  target: apk,     cmd: "flutter build apk --debug",              artifact: "build/app/outputs/flutter-apk/app-debug.apk" }
          - { label: "Web",           os: ubuntu-latest,  target: web,     cmd: "flutter build web --pwa-strategy=none",  artifact: "build/web" }
          - { label: "Linux",         os: ubuntu-latest,  target: linux,   cmd: "flutter build linux --debug",            artifact: "build/linux/x64/debug/bundle" }
          - { label: "iOS",           os: macos-latest,   target: ios,     cmd: "flutter build ios --debug --no-codesign", artifact: "build/ios/iphoneos" }
          - { label: "macOS",         os: macos-latest,   target: macos,   cmd: "flutter build macos --debug",            artifact: "build/macos/Build/Products/Debug" }
          - { label: "Windows",       os: windows-latest, target: windows, cmd: "flutter build windows --debug",          artifact: "build/windows/x64/runner/Debug" }
    steps:
      - uses: actions/checkout@v4

      - name: Linux desktop build deps (GTK/ninja)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - uses: actions/setup-java@v4
        if: matrix.target == 'apk'
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get

      - name: Codegen (freezed/json_serializable parts are gitignored)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.cmd }}

      - name: Upload ${{ matrix.target }} build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn
