name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flutter-gate:
    name: Flutter gate (codegen · analyze · test · build web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Codegen (freezed/json_serializable parts are gitignored)
        run: dart run build_runner build
      - name: Analyze (fails on infos too)
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Test (auth flow behind RATEL_AUTH=true)
        run: flutter test --dart-define=RATEL_AUTH=true
      - name: Build web (no service worker; stale-cache guard)
        run: flutter build web --pwa-strategy=none --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      - name: Write build marker
        run: |
          echo "ratel ${{ github.sha }} | flutter 3.44.1 | built $(date -u +%FT%TZ)" > build/web/build-info.txt
          cat build/web/build-info.txt
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
  python-schema-gate:
    name: Python gate (schema lint · fixtures · model drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python tooling (schema + pipeline + tokenizers)
        run: pip install -r ratel-tools/requirements.txt
      - name: pytest — schema + pipeline (T0.2 · T2.1)
        run: python -m pytest ratel-tools/tests -q
      - name: Secret scan (M7 P0-6 · no committed service-role/Stripe/Google/PEM keys)
        run: python -m pytest ratel-tools/tests/test_secret_scan.py -q
      - name: Voice-safety scan (VOICE-1 · R-K3/R-H7 — no schema column persists raw audio / voiceprint)
        run: python -m pytest ratel-tools/tests/test_voice_no_audio_persist.py -q
      - name: RTM drift — regenerate traceability matrix, assert it is up to date
        run: python -m pytest ratel-tools/tests/test_traceability.py -q
      - name: Model drift — regenerate Dart from schema, assert no diff (schema is the SoT)
        run: |
          python ratel-tools/codegen_dart.py
          git diff --exit-code lib/content/models/enums.dart lib/content/models/payloads.dart lib/content/models/tables.dart lib/content/models/models.dart \
            || { echo "::error::lib/content/models is stale vs schema/ — run: python3 ratel-tools/codegen_dart.py && dart run build_runner build, then commit"; exit 1; }
  db-rls-gate:
    name: DB gate (Part D pg_dump diff=0 · RLS isolation — disposable pgserver, live Supabase untouched)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Stage-3 DB harness (pgserver+pg8000); fall back to base tooling so DB tests skip-clean if the harness is unavailable
        run: pip install -r ratel-tools/requirements-dev.txt || pip install -r ratel-tools/requirements.txt
      - name: pytest — Part D pg_dump diff=0 + entitlement/credit + per-table RLS isolation (importorskip if pgserver absent)
        run: python -m pytest ratel-tools/tests/test_pg_dump_parity.py ratel-tools/tests/test_rls_entitlement.py ratel-tools/tests/test_rls_isolation.py ratel-tools/tests/test_credit_ledger.py ratel-tools/tests/test_entitlement_events.py ratel-tools/tests/test_review_log_partitions.py ratel-tools/tests/test_dsar_delete_anchor.py ratel-tools/tests/test_audit_log.py ratel-tools/tests/test_league_cohort.py ratel-tools/tests/test_friend_rpcs.py ratel-tools/tests/test_friend_quest.py ratel-tools/tests/test_sync_tables.py -q

  web-pwa-gate:
    name: Web gate (PWA service-worker offline behaviour)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Service-worker behavioural test (mocked Cache/fetch, all strategies)
        run: node --test test/web/service_worker.logic.test.mjs
